name: Auto Update Search Data

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      sitegraph_ref:
        description: 'njupt-site-graph ref to consume'
        required: false
        type: string
        default: 'main'

permissions:
  contents: write

concurrency:
  group: auto-update-search-data-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update-data:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}/scripts
      SITEGRAPH_INDEX: _sitegraph/njupt-site-graph/data/sites/jwc/index

    steps:
      - name: Checkout njupt-search
        uses: actions/checkout@v4

      - name: Checkout JWC sitegraph package
        uses: actions/checkout@v4
        with:
          repository: hicancan/njupt-site-graph
          ref: ${{ github.event.inputs.sitegraph_ref || 'main' }}
          path: _sitegraph/njupt-site-graph
          token: ${{ secrets.NJUPT_SITEGRAPH_TOKEN || github.token }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          npm ci

      - name: Run exam crawler
        run: python scripts/auto_update_exam_data.py

      - name: Process exam Excel files
        run: python scripts/analyze_and_update.py

      - name: Validate upstream JWC sitegraph package
        run: python scripts/validate_sitegraph_index.py --sitegraph-index "$SITEGRAPH_INDEX" --skip-output

      - name: Build pure JWC sitegraph search index
        run: python scripts/build_sitegraph_index.py --sitegraph-index "$SITEGRAPH_INDEX"

      - name: Validate pure JWC sitegraph search index
        run: |
          python scripts/validate_sitegraph_index.py --sitegraph-index "$SITEGRAPH_INDEX"
          python scripts/utils/validate_search_index.py

      - name: Representative sitegraph search smoke test
        run: python scripts/eval/sitegraph_query_smoke_test.py

      - name: Python integrity checks
        run: |
          python -m py_compile \
            scripts/build_sitegraph_index.py \
            scripts/validate_sitegraph_index.py \
            scripts/sitegraph_search.py \
            scripts/auto_update_exam_data.py \
            scripts/analyze_and_update.py \
            scripts/eval/sitegraph_query_smoke_test.py \
            scripts/utils/validate_search_index.py
          python -m unittest discover -s tests
          python -m pytest tests

      - name: Frontend checks
        run: |
          npm test
          npm run typecheck
          npm run build

      - name: Check for changes
        id: git-check
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add public/data/ public/index/
          if git diff --staged --quiet; then
            echo "changes=false" >> $GITHUB_OUTPUT
          else
            echo "changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and Push
        if: steps.git-check.outputs.changes == 'true'
        run: |
          git commit -m "Auto-update exam data and JWC sitegraph index"
          git push
