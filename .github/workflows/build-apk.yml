name: Build and Release Android APK

on:
  push:
    tags:
      - 'v*' # Trigger on version tags (e.g., v1.0.0)
  workflow_dispatch: # Enable manual trigger from UI

permissions:
  contents: write # Needed to create GitHub Releases

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build APK with Bubblewrap Docker
        run: |
          yes | docker run -i --rm -v ${{ github.workspace }}:/app -w /app ghcr.io/googlechromelabs/bubblewrap:latest build --skipPwaValidation --keystorePassword bubblewrap --keyPassword bubblewrap

      - name: Upload APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: njupt-exam-apk
          path: |
            app-release-signed.apk
            app-release-bundle.aab

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app-release-signed.apk
            app-release-bundle.aab
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || 'latest' }}
          generate_release_notes: true
